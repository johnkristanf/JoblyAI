version: "3"
services:
  app:
    build:
      context: ../../
      dockerfile: Dockerfile
    image: johnkristan/joblyai:latest
    container_name: joblyai
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - redis-server
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: always

  celery:
    build:
      context: ../../
      dockerfile: Dockerfile
    image: johnkristan/joblyai:latest
    container_name: joblyai-celery
    depends_on:
      - redis-server
    command: ["celery", "-A", "src.celery", "worker", "--loglevel", "INFO", "--concurrency", "2"]
    restart: always

  redis-server:
    image: redis:latest
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  redis-data:
