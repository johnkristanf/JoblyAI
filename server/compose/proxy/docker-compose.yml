version: "3"

services:
  swag:
    image: lscr.io/linuxserver/swag:latest
    container_name: swag
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - URL=api.joblyai.it.com
      - VALIDATION=http
      - EMAIL=joblyai01@gmail.com
    volumes:
      - swag-data:/config
      - ./nginx/default.conf:/config/nginx/site-confs/default.conf:ro
    network_mode: "host"
    restart: unless-stopped

volumes:
  swag-data:
