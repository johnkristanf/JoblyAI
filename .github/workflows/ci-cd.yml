name: JoblyAI CI/CD Pipeline

on:
  push:
    branches:
      - production
  workflow_dispatch: # Allow manual triggers

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/joblyai:latest

      - name: Logout from DockerHub
        if: always()
        run: docker logout

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Deploy to EC2 using in-memory SSH key
        run: |
          # Start a temporary SSH agent
          eval "$(ssh-agent -s)"

          # Add the SSH key from the GitHub secret
          echo "${{ secrets.EC2_SSH_KEY }}" | ssh-add - >/dev/null

          # Copy docker-compose configurations and observability configs to EC2
          scp -o StrictHostKeyChecking=no -r server/compose ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/
         
          # Connect via SSH and deploy
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd /home/${{ secrets.EC2_USER }}
            
            # Fetch secrets from SSM to create .env.observability
            GRAFANA_USER=$(aws ssm get-parameter --name "/joblyai/prod/GRAFANA_ADMIN_USER" --with-decryption --query "Parameter.Value" --output text --region ap-southeast-1)
            GRAFANA_PASSWORD=$(aws ssm get-parameter --name "/joblyai/prod/GRAFANA_ADMIN_PASSWORD" --with-decryption --query "Parameter.Value" --output text --region ap-southeast-1)
            GF_SERVER_DOMAIN=$(aws ssm get-parameter --name "/joblyai/prod/GF_SERVER_DOMAIN" --with-decryption --query "Parameter.Value" --output text --region ap-southeast-1)
            GF_SERVER_ROOT_URL=$(aws ssm get-parameter --name "/joblyai/prod/GF_SERVER_ROOT_URL" --with-decryption --query "Parameter.Value" --output text --region ap-southeast-1)
            GF_SERVER_SERVE_FROM_SUB_PATH=$(aws ssm get-parameter --name "/joblyai/prod/GF_SERVER_SERVE_FROM_SUB_PATH" --with-decryption --query "Parameter.Value" --output text --region ap-southeast-1)
           
            echo "GF_SECURITY_ADMIN_USER=$GRAFANA_USER" > compose/observability/.env.observability
            echo "GF_SECURITY_ADMIN_PASSWORD=$GRAFANA_PASSWORD" >> compose/observability/.env.observability
            echo "GF_SERVER_DOMAIN=$GF_SERVER_DOMAIN" >> compose/observability/.env.observability
            echo "GF_SERVER_ROOT_URL=$GF_SERVER_ROOT_URL" >> compose/observability/.env.observability
            echo "GF_SERVER_SERVE_FROM_SUB_PATH=$GF_SERVER_SERVE_FROM_SUB_PATH" >> compose/observability/.env.observability

            docker compose -f compose/app/docker-compose.yml down
            docker compose -f compose/app/docker-compose.yml pull
            docker compose -f compose/app/docker-compose.yml up -d --remove-orphans

            docker compose -f compose/observability/docker-compose.yml down
            docker compose -f compose/observability/docker-compose.yml pull
            docker compose -f compose/observability/docker-compose.yml up -d --remove-orphans

            docker compose -f compose/proxy/docker-compose.yml down
            docker compose -f compose/proxy/docker-compose.yml pull
            docker compose -f compose/proxy/docker-compose.yml up -d --remove-orphans

            docker image prune -f
          EOF

          # Kill the temporary SSH agent
          ssh-agent -k
